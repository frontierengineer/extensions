# Open submission, no human gate: an agent-catalog PR that passes mechanical
# validation is merged automatically. pull_request_target is required so the
# job has write permissions on fork PRs — safe here because ONLY the base
# branch's scripts run; the PR checkout is read as data. The `paths` filter
# keeps this off PRs that don't touch the agent catalog (extension-listing PRs
# are handled by validate-listing.yml).
name: validate-agents

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'agents/catalog/**'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: validate-agents-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Checkout PR (data only — never executed)
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          path: pr
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate agents
        id: validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: enables the LLM review pass on each submitted prompt.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/validate-agents.js --pr-dir pr --author "${{ github.event.pull_request.user.login }}"

      - name: Auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --squash
          # Merges by GITHUB_TOKEN don't fire push-triggered workflows, so kick
          # the index build explicitly to pick up the new agent.
          gh workflow run agents-index.yml --repo ${{ github.repository }}

      - name: Explain failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body \
            "Automated validation failed — see the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for the reason. Fix and push again; passing PRs merge automatically with no human review."
