# Open submission with a safety gate. An agent body is an executable system
# prompt, so a passing PR auto-merges ONLY when the prompt-safety review cleared
# it (validate outputs automerge=true); otherwise the PR is held for a human
# (fail-closed — never merge an unreviewed prompt on schema alone).
# pull_request_target is required so the job has write permissions on fork PRs —
# safe here because ONLY the base branch's scripts run; the PR checkout is read
# as data. The `paths` filter keeps this off PRs that don't touch the agent
# catalog (extension-listing PRs are handled by validate-listing.yml).
name: validate-agents

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'agents/catalog/**'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: validate-agents-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Checkout PR (data only — never executed)
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          path: pr
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate agents
        id: validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: enables the LLM review pass on each submitted prompt.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/validate-agents.js --pr-dir pr --author "${{ github.event.pull_request.user.login }}"

      - name: Auto-merge (review cleared)
        if: steps.validate.outputs.automerge == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --squash
          # Merges by GITHUB_TOKEN don't fire push-triggered workflows, so kick
          # the index build explicitly to pick up the new agent.
          gh workflow run agents-index.yml --repo ${{ github.repository }}

      - name: Hold for human review
        # Validation passed but the prompt-safety review didn't clear the
        # content (no reviewer configured, or it flagged the prompt). Do NOT
        # merge — leave the PR open for a maintainer. This is not a failure the
        # author can fix, so it's a comment, not a red X.
        if: success() && steps.validate.outputs.automerge != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOLD_REASON: ${{ steps.validate.outputs.hold_reason }}
        run: |
          BODY="$(printf '%s\n\n%s\n\n%s' \
            'This agent PR passed the schema, size, and namespace-ownership checks, but the automated prompt-safety review did not clear it — either no reviewer is configured for this repo, or it flagged the prompt for a closer look. An agent body is a system prompt people run against their own code, so it is **held for a Frontier maintainer to review before merge** rather than merged automatically. Nothing to fix on your end — a maintainer will take it from here.' \
            'Reason:' \
            "$HOLD_REASON")"
          gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "$BODY"

      - name: Explain failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body \
            "Automated validation failed — see the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for the reason. Fix and push again; a PR that passes the checks and clears the prompt-safety review merges automatically, otherwise it's held for a maintainer."
